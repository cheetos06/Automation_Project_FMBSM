name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile source
        run: |
          python -m compileall -q services/automation-mail-worker apps/token-pool-client/src
      - name: Install test dependencies
        run: python -m pip install "cryptography>=46,<48" "python-dotenv>=1.1,<2"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Reject committed private runtime files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)(\.env$|private_|server\.key$|.*\.pem$)'; then
            echo "Private runtime material is tracked." >&2
            exit 1
          fi
