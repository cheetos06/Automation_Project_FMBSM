name: Release Token Pool Client

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/token-pool-client/**"
      - ".github/workflows/token-client-release.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve public endpoint manifest
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw deployment/token-pool-endpoint.json | ConvertFrom-Json
          if ($manifest.schema_version -ne 1 -or $manifest.deployment -ne "fmbsm-production") {
            throw "Invalid token-pool endpoint manifest."
          }
          $endpoint = [Uri]([string]$manifest.endpoint)
          if ($endpoint.Scheme -notin @("http", "https") -or -not $endpoint.Host) {
            throw "Token-pool endpoint manifest does not contain a valid HTTP(S) origin."
          }
          "TOKEN_POOL_PUBLIC_ENDPOINT=$($endpoint.GetLeftPart([UriPartial]::Authority).TrimEnd('/'))" >> $env:GITHUB_ENV
          "TOKEN_POOL_SSH_HOST=$($endpoint.Host)" >> $env:GITHUB_ENV
      - name: Prepare pinned client configuration
        shell: pwsh
        env:
          TOKEN_POOL_UPLOAD_KEY: ${{ secrets.TOKEN_POOL_UPLOAD_KEY }}
          TOKEN_POOL_CA_CERT_B64: ${{ secrets.TOKEN_POOL_CA_CERT_B64 }}
        run: |
          if (-not $env:TOKEN_POOL_UPLOAD_KEY -or -not $env:TOKEN_POOL_CA_CERT_B64) {
            throw "Token client release secrets are not configured."
          }
          $root = "apps/token-pool-client"
          [IO.File]::WriteAllBytes("$root/server.crt", [Convert]::FromBase64String($env:TOKEN_POOL_CA_CERT_B64))
          @{
            endpoint = $env:TOKEN_POOL_PUBLIC_ENDPOINT
            upload_key = $env:TOKEN_POOL_UPLOAD_KEY
            ca_certificate = "server.crt"
            github_repository = "cheetos06/Automation_Project_FMBSM"
          } | ConvertTo-Json | Set-Content "$root/client-config.json" -Encoding utf8
      - name: Build standalone Windows app
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          ./apps/token-pool-client/build.ps1 `
            -Version $version `
            -ArtifactMirrorBaseUrl "$env:TOKEN_POOL_PUBLIC_ENDPOINT/downloads/token-client" `
            -RequireRegisteredRuntime
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
      - name: Smoke-test packaged executable
        shell: pwsh
        run: |
          $exe = "apps/token-pool-client/dist/TokenPoolClient/TokenPoolClient.exe"
          if (-not (Test-Path $exe)) { throw "Packaged executable missing." }
          # PyInstaller builds a GUI-subsystem executable, so direct invocation
          # does not reliably populate PowerShell's $LASTEXITCODE. Use a clean,
          # empty account store and wait on the actual process. --refresh-all
          # loads the embedded release configuration without making a network
          # request when no accounts have been enrolled yet.
          $env:TOKEN_POOL_CLIENT_DATA = Join-Path $env:RUNNER_TEMP "token-client-smoke"
          $env:TOKEN_POOL_CLIENT_CONFIG = (Resolve-Path "apps/token-pool-client/release/TokenPoolClient-win-x64/client-config.json").Path
          New-Item -ItemType Directory -Force $env:TOKEN_POOL_CLIENT_DATA | Out-Null
          $process = Start-Process -FilePath $exe -ArgumentList "--refresh-all" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged CLI smoke test failed with exit code $($process.ExitCode)."
          }
      - name: Publish app-specific release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "token-client-v$env:RELEASE_VERSION"
          $root = "apps/token-pool-client/release"
          $parts = @(Get-ChildItem $root -Filter "TokenPoolClient-win-x64.zip.part*" | Sort-Object Name)
          if ($parts.Count -lt 2) { throw "Chunked release assets are missing." }
          $assets = @(
            "$root/TokenPoolClient-win-x64.zip"
            "$root/TokenPoolClient-win-x64.zip.sha256"
            "$root/TokenPoolClient-app-win-x64.zip"
            "$root/TokenPoolClient-app-win-x64.zip.sha256"
            "$root/TokenPoolClient-release.json"
          ) + @($parts | ForEach-Object { $_.FullName })
          gh release create $tag @assets `
            --title "Token Pool Client $env:RELEASE_VERSION" `
            --notes "Path-scoped Windows Token Pool Client release. Other repository changes do not trigger this update." `
            --target $env:GITHUB_SHA
      - name: Mirror proxy-safe assets to AWS
        shell: bash
        env:
          TOKEN_ARTIFACT_SFTP_KEY: ${{ secrets.TOKEN_ARTIFACT_SFTP_KEY }}
          TOKEN_ARTIFACT_SSH_HOST_KEY: ${{ secrets.TOKEN_ARTIFACT_SSH_HOST_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN_ARTIFACT_SFTP_KEY" || -z "$TOKEN_ARTIFACT_SSH_HOST_KEY" ]]; then
            echo "Token client artifact mirror secrets are not configured." >&2
            exit 1
          fi
          tag="token-client-v$RELEASE_VERSION"
          root="apps/token-pool-client/release"
          key="$RUNNER_TEMP/token-artifact-sftp-key"
          known_hosts="$RUNNER_TEMP/token-artifact-known-hosts"
          batch="$RUNNER_TEMP/token-artifact-sftp-batch"
          printf '%s\n' "$TOKEN_ARTIFACT_SFTP_KEY" > "$key"
          # Preserve the pinned SSH key material while replacing only the
          # public hostname/IP, which may change when Lightsail is stopped.
          host_key_material="$(printf '%s\n' "$TOKEN_ARTIFACT_SSH_HOST_KEY" | awk 'NF >= 3 { print $2 " " $3; exit }')"
          if [[ -z "$host_key_material" ]]; then
            echo "Token artifact SSH host key is malformed." >&2
            exit 1
          fi
          printf '%s %s\n' "$TOKEN_POOL_SSH_HOST" "$host_key_material" > "$known_hosts"
          chmod 600 "$key" "$known_hosts"
          {
            echo "-mkdir token-client"
            echo "-mkdir token-client/$tag"
            echo "cd token-client/$tag"
            echo "put $root/TokenPoolClient-app-win-x64.zip"
            echo "put $root/TokenPoolClient-app-win-x64.zip.sha256"
            echo "put $root/TokenPoolClient-release.json"
            echo "put $root/TokenPoolClient-win-x64.zip.sha256"
            for part in "$root"/TokenPoolClient-win-x64.zip.part*; do
              echo "put $part"
            done
          } > "$batch"
          sftp -q -b "$batch" -i "$key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$known_hosts" \
            "fmbsm-artifacts@$TOKEN_POOL_SSH_HOST"
